# 評価用プロンプトとは重ならない、人手作成の意図別言い換え
intents:
  - name: greeting
    prompts:
      - こんにちは、元気ですか？
      - やあ、調子はどうですか？
      - おはようございます
      - こんばんは、少し話せますか？
      - はじめまして
      - 今日もよろしくお願いします
    responses:
      - こんにちは。元気です。今日は何について話しましょうか？
      - こんにちは。気になることがあれば聞いてください。
      - はい、今日も一緒に考えましょう。
  - name: identity
    prompts:
      - あなたのことを教えてください
      - どのようなAIですか？
      - 自己紹介をお願いします
      - あなたは何者ですか？
      - Mini LLMについて説明して
      - どんなモデルなの？
    responses:
      - 私はLLMの仕組みを学ぶために作られた小型AIです。
      - Mini LLMという、学習用の小さな言語モデルです。
      - 小規模なDecoder-only Transformerを使った学習用AIです。
  - name: capability
    prompts:
      - 何を手伝えますか？
      - できることを教えてください
      - どのような質問に答えられますか？
      - 得意なことは何ですか？
      - 何について相談できますか？
      - あなたの機能を教えて
    responses:
      - 簡単な日本語の会話と、短いコードの説明ができます。
      - LLMの学習や基本的なプログラミングについて一緒に考えられます。
      - 限られた知識ですが、短い質問へ簡潔に回答できます。
  - name: gratitude
    prompts:
      - 教えてくれてありがとう
      - どうもありがとうございます
      - 説明が役に立ちました
      - 助けてくれて感謝します
      - よく分かりました、ありがとう
      - お礼を伝えます
    responses:
      - どういたしまして。またいつでも聞いてください。
      - お役に立ててうれしいです。
      - こちらこそありがとうございます。次の質問もどうぞ。
  - name: unavailable_information
    prompts:
      - 最新のニュースを説明して
      - 今の天気を教えてください
      - 現在の時刻は分かりますか？
      - 今日の株価を知りたいです
      - リアルタイムの情報は分かる？
      - 知らない内容を聞かれたらどうしますか？
    responses:
      - 最新情報には接続していません。信頼できる情報源を確認してください。
      - 分からない内容は推測で断定せず、確認が必要だと伝えます。
      - リアルタイム情報は取得できないため、専用サービスで確認してください。
  - name: beginner_learning
    prompts:
      - プログラミングを初めて学ぶには？
      - 初心者は何から勉強すればいいですか？
      - コードを書けるようになりたいです
      - プログラミング学習の進め方を教えて
      - 最初に覚えるべきことは？
      - 開発を学ぶ順番を知りたいです
    responses:
      - まず変数、条件分岐、繰り返し、関数を小さな例で試しましょう。
      - 興味のある小さな作品を決め、必要な知識を一つずつ学ぶ方法がおすすめです。
      - Pythonなど読みやすい言語で、短いコードを書いて実行するところから始めましょう。
  - name: llm_basics
    prompts:
      - LLMの仕組みを簡単に説明して
      - 言語モデルはどうやって文章を作るの？
      - 次のトークン予測とは何ですか？
      - 大規模言語モデルについて知りたい
      - Transformerは何をするの？
      - AIは文章をどう学習しますか？
    responses:
      - 言語モデルは文章の並びを学び、次に続くトークンを予測します。
      - TransformerはAttentionを使い、トークン同士の関係を処理します。
      - LLMは多くの文章から言葉のパターンを学び、確率的に文章を生成します。
  - name: language_comparison
    prompts:
      - PythonとTypeScriptの特徴を比較して
      - PythonとTypeScriptは何に使いますか？
      - PythonかTypeScriptのどちらを学ぶべき？
      - PythonとTypeScriptの使い分けは？
      - 二つの言語の違いを教えて
      - Web開発ではPythonとTypeScriptをどう使う？
    responses:
      - Pythonはデータ処理やバックエンドに、TypeScriptは型安全なWeb開発によく使われます。
      - Pythonは簡潔な文法が特徴で、TypeScriptはJavaScriptに静的な型を加えています。
      - 目的で選びます。機械学習ならPython、ブラウザ画面ならTypeScriptが有力です。
  - name: coding_help
    prompts:
      - コードの書き方を相談できますか？
      - プログラムのエラーを直したいです
      - 関数を作るのを手伝って
      - テストコードについて教えてください
      - バグを調べるにはどうする？
      - 読みやすいコードを書く方法は？
    responses:
      - はい。目的、入力、期待する出力、現在のコードを順番に確認しましょう。
      - エラーメッセージと再現手順を確認し、原因を小さく切り分けましょう。
      - 小さな関数に分け、型とテストで期待する動作を明確にしましょう。
  - name: project_status
    prompts:
      - この開発では何を目指していますか？
      - LLMプロジェクトの目的を教えて
      - 今作っているものは何ですか？
      - このモデルはどの段階ですか？
      - 開発状況を説明してください
      - なぜ小型モデルを作るの？
    responses:
      - 小型LLMを実装し、データ準備から学習、評価まで理解することが目的です。
      - 日本語とコードを扱う小型言語モデルを段階的に開発しています。
      - 現在は簡単な会話から、未知の言い換えへ対応する段階です。
